<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Empire Grid</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="boot">
    <div class="bootCard">
      <div class="logo">EMPIRE GRID</div>
      <div class="tag">Neon-Industrial Megaregion Builder</div>
      <div class="sub">Survival + Creative • Seeded Worlds • Deep Builds</div>
      <div class="bootRow">
        <button id="btnStart">Start</button>
        <button id="btnContinue" class="ghost">Continue</button>
      </div>
      <div class="bootRow small">
        <input id="seedInput" placeholder="Seed (optional)" />
        <select id="modeSelect">
          <option value="survival" selected>Survival</option>
          <option value="creative">Creative</option>
        </select>
      </div>
      <div class="bootRow tiny">
        <label><input id="chkAutoPerf" type="checkbox" checked> Auto performance</label>
        <label><input id="chkCreator" type="checkbox"> Creator mode overlay</label>
      </div>
      <div class="bootFoot" id="bootFoot"></div>
    </div>
  </div>

  <canvas id="game"></canvas>

  <!-- HUD / Panels -->
  <div id="hudRoot"></div>

  <!-- Spotlight tutorial -->
  <div id="spotlight" class="hidden">
    <div id="spotMask"></div>
    <div id="spotBox">
      <div id="spotTitle"></div>
      <div id="spotText"></div>
      <div id="spotButtons">
        <button id="spotNext">Next</button>
        <button id="spotSkip" class="ghost">Skip</button>
      </div>
    </div>
  </div>

  <!-- Admin overlay -->
  <div id="adminLock" class="hidden">
    <div class="adminCard">
      <div class="adminTitle">Admin Console</div>
      <div class="adminSub">Enter passcode</div>
      <input id="adminPass" placeholder="Passcode" />
      <div class="bootRow">
        <button id="adminEnter">Enter</button>
        <button id="adminCancel" class="ghost">Cancel</button>
      </div>
      <div class="bootFoot" id="adminMsg"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
